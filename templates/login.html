{% extends "base.html" %}
{% block title %}Login | Stellar Seats Attendance{% endblock %}

{% block content %}
<div class="login-wrap">
    <div class="login-card">
        <div style="text-align:center; margin-bottom: 24px;">
            <div class="brand-logo" style="margin:0 auto 14px;">
                <img src="{{ url_for('static', filename='stellar-seats-logo.svg') }}" alt="Stellar Seats logo">
            </div>
            <div class="brand centered" style="margin-bottom:14px;">
                <div class="brand-title">Stellar Seats</div>
                <div class="brand-sub strong">Attendance Portal</div>
            </div>
            <h1 class="login-title">Welcome Back</h1>
            <p class="muted" style="margin-top: 8px;">Sign in to Stellar Seats Attendance Tracker</p>
        </div>

        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
            <label>Username</label>
            <input class="input" type="text" name="username" placeholder="Enter username" required>

            <label style="display:block; margin-top: 14px;">Password</label>
            <input class="input" type="password" name="password" placeholder="Enter password" required>

            <button class="btn btn-primary" type="submit" style="width:100%; margin-top: 18px;">
                Login
            </button>
        </form>
    </div>
</div>
{% endblock %}
